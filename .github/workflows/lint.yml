name: lint

on:
  push:
    branches: [master, main, v2]
  pull_request:
    branches: [master, main, v2]

jobs:
  ruff:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check batch/ tests/

      - name: Run ruff format check
        run: ruff format --check batch/ tests/
